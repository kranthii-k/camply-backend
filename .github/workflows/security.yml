name: Security & Code Review Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  security-and-build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Audit Vulnerabilities
      run: npm audit --audit-level=high

    - name: Lint Codebase
      run: npm run lint
      continue-on-error: true

    - name: Typescript Compiler Check
      run: npx tsc --noEmit

    - name: Run Backend Tests
      run: npx vitest run
